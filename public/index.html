<!doctype html>
<html lang="en">

    <link rel="stylesheet" href="style.css" />

      <div id="titleHead" class="fr">
        <img
          id="logo"
          src="../assets/icons/government-svgrepo-com.svg"

          class="headerIcon"

        />
        <!-- Icon wasn't apeearing, issue was missing of "../" in path. -->
