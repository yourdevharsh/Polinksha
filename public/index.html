<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polinksha</title>

    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="util.css" />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link
      href="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <div id="titleHead" class="fr">
        <img
          id="logo"
          src="../assets/icons/government-svgrepo-com.svg"
          alt="icon"
        />
        <div id="nameNsettings" class="fc">
          <h3 contenteditable="true">Project Name</h3>
          <nav class="fr">
            <button>View</button>
            <button>Help</button>
            <button>Settings</button>
          </nav>
        </div>
      </div>

      <div id="toolBar" class="fr">
        <input
          type="text"
          name="location"
          id="searchedLocation"
          placeholder="Search Polinksha"
        />

        <img
          class="headerIcon"
          src="../assets/icons/location-plus-svgrepo-com.svg"
          alt="icon"
        />
        <!-- Icon wasn't apeearing, issue was missing of "../" in path. -->
        <img
          class="headerIcon"
          src="../assets/icons/measure-svgrepo-com.svg"
          alt="icon"
        />
      </div>
    </header>
    <aside></aside>
    <main>
      <section id="map"></section>
      <section id="map2"></section>
    </main>
    <footer></footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/maplibre-gl@4.0.0/dist/maplibre-gl.js"></script>
    <script src="custom.js"></script>
    <script src="script.js"></script>
  </body>
</html>
